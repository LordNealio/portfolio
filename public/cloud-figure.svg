<svg xmlns="http://www.w3.org/2000/svg" width="760" height="920" viewBox="0 0 760 920" role="img" aria-label="The cloud figure — Neal">
  <defs>
    <radialGradient id="cf-halo" cx="50%" cy="34%" r="52%">
      <stop offset="0%" stop-color="#c9a24b" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#c9a24b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a24b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cf-cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#efe9db"/>
    </linearGradient>
  </defs>

  <!-- halo -->
  <circle cx="380" cy="300" r="360" fill="url(#cf-halo)"/>

  <!-- cloud crown -->
  <g fill="url(#cf-cloud)">
    <circle cx="380" cy="150" r="86"/>
    <circle cx="286" cy="196" r="66"/>
    <circle cx="474" cy="196" r="66"/>
    <circle cx="230" cy="244" r="52"/>
    <circle cx="530" cy="244" r="52"/>
    <ellipse cx="380" cy="236" rx="150" ry="72"/>
  </g>

  <!-- robed figure (the white outfit) -->
  <g fill="url(#cf-cloud)" stroke="#d8d0be" stroke-width="1.5">
    <!-- head -->
    <circle cx="380" cy="330" r="52" stroke="none"/>
    <!-- shoulders + robe -->
    <path d="M380 372
             C300 372 268 410 258 470
             L232 720
             C232 720 300 748 380 748
             C460 748 528 720 528 720
             L502 470
             C492 410 460 372 380 372 Z"/>
    <!-- G vest panel -->
    <path d="M330 452 L430 452 L430 660 C430 690 405 706 380 706 C355 706 330 690 330 660 Z"
          fill="#efe9db" stroke="#cbbf9f" stroke-width="2"/>
  </g>
  <!-- the G monogram on the vest -->
  <text x="380" y="588" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="150" font-weight="600" fill="#9a7628">G</text>

  <!-- ground shadow -->
  <ellipse cx="380" cy="792" rx="150" ry="16" fill="#000" opacity="0.10"/>
</svg>
