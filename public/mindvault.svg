<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="MindVault AI — Mondrian-style mark">
  <!-- white base -->
  <rect width="1024" height="1024" fill="#FAFAF7"/>

  <!-- colour blocks -->
  <rect x="32"  y="32"  width="308" height="218" fill="#F5C518"/>  <!-- yellow top-left -->
  <rect x="720" y="32"  width="272" height="368" fill="#1D4ED8"/>  <!-- blue top-right -->
  <rect x="32"  y="400" width="308" height="592" fill="#E1121F"/>  <!-- red left column -->
  <rect x="430" y="640" width="562" height="190" fill="#1D4ED8"/>  <!-- blue lower band -->
  <rect x="340" y="830" width="90"  height="162" fill="#F5C518"/>  <!-- small yellow accent -->

  <!-- black grid (border + internal lines) -->
  <g fill="#0A0A0A">
    <!-- outer border -->
    <rect x="0" y="0" width="1024" height="32"/>
    <rect x="0" y="992" width="1024" height="32"/>
    <rect x="0" y="0" width="32" height="1024"/>
    <rect x="992" y="0" width="32" height="1024"/>
    <!-- vertical lines -->
    <rect x="340" y="32"  width="16" height="960"/>
    <rect x="720" y="32"  width="16" height="368"/>
    <rect x="430" y="640" width="16" height="352"/>
    <!-- horizontal lines -->
    <rect x="32"  y="250" width="688" height="16"/>
    <rect x="340" y="400" width="652" height="16"/>
    <rect x="340" y="640" width="652" height="16"/>
    <rect x="32"  y="830" width="960" height="16"/>
  </g>

  <!-- wordmark in the central white block -->
  <g fill="#0A0A0A" font-family="'Plus Jakarta Sans', Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="-2">
    <text x="384" y="500" font-size="118">MindVault</text>
    <text x="384" y="606" font-size="118">AI</text>
  </g>
</svg>
